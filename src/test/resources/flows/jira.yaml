id: jira
namespace: io.kestra.tests

inputs:
  - id: url
    type: STRING
    defaults: "http://localhost:59443"

tasks:
  - id: jira
    type: io.kestra.plugin.jira.issues.Create
    baseUrl: https://your-domain.atlassian.net
    username: your_email@example.com
    password: your_jira_api_token
    projectKey: myproject
    issueTypeId: 10003
    summary: "{{ execution.id }} has failed on {{ taskrun.startDate }}"
    description: "See the link below for more details"
    labels:
      - bug
      - workflow

triggers:
  - id: on_failure
    type: io.kestra.plugin.core.trigger.Flow
    preconditions:
      id: flow_trigger
      flows:
        - namespace: io.kestra.tests
          flowId: main-flow-that-fails
          states: [ FAILED ]